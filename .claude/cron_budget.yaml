# pyfinagent cron budget - HARD CAP: 15 Claude scheduled routine runs per day.
#
# NOTE: The 15/day cap is SELF-IMPOSED for cost + cognitive-load
# management -- it is NOT an Anthropic limit. The Anthropic API accepts
# unbounded programmatic requests; we cap ourselves at 15 scheduled
# routine runs/day because each run costs tokens and human attention on
# review. Burst / on-demand / user-triggered calls are out of scope for
# this cap.
#
# Owned by phase-10.7 Meta-Evolution Engine (Cron Budget Allocator step).
# Trading-ops slots (1-5) are RESERVED: any diff touching them requires
# human-in-loop approval (Peder) -- EXTERNAL APPROVAL GATE REQUIRED.
# Research slots (6-15) are reallocatable by Alpha Velocity weekly.
#
# Schema per slot:
#   slot_id: int (1-15)
#   phase: string (phase-id that owns the slot)
#   job_name: string (human-readable label)
#   cadence: one of [daily, weekday, weekly, monthly, on-demand]
#   priority: one of [reserved, high, medium, low]
#   alpha_velocity_eligible: bool (false for trading-ops, true for research)
#   surface: one of [routine, desktop, loop, external]
#     routine  - scheduled cron (APScheduler) inside pyfinagent backend
#     desktop  - Claude Code desktop session (human-at-keyboard)
#     loop     - /loop-mode continuous self-paced runs
#     external - webhook / Slack / third-party trigger

