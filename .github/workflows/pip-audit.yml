name: pip-audit

# Supply-chain security audit: scans backend/requirements.txt for
# known CVEs against PyPI advisory database. Runs on every push
# to main, every PR, and weekly on a fixed schedule so drift into
# a vulnerable transitive is caught within 7 days.
#
# phase-4.8.8 (Cycle 85). Pairs with the exact-pinned LLM clients
# set up in phase-3.7.6 (Cycle 65) so the audit has a stable
# dependency graph to evaluate.

on:
  push:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "requirements.txt"
      - ".github/workflows/pip-audit.yml"
  pull_request:
    paths:
      - "backend/requirements.txt"
      - "requirements.txt"
  schedule:
    # Weekly, Mondays at 07:00 UTC. Keeps cadence aligned with
    # the runbook drills (next drill 2026-07-18, Monday).
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (strict)
        run: |
          pip-audit \
            --requirement backend/requirements.txt \
            --strict \
            --progress-spinner off

      - name: Upload audit output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: |
            backend/requirements.txt
          retention-days: 30
