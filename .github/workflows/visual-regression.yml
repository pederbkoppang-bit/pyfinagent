name: Visual Regression

# phase-25.A12: Playwright visual regression CI baseline.
#
# Closes phase-24.12 F-6 (docs/audits/phase-24-2026-05-12/screenshots/
# was empty; no baseline images for visual-regression comparison).
#
# Operator first-run flow:
#   1. From GitHub UI -> Actions -> "Visual Regression" -> Run workflow.
#   2. Set `update_snapshots = true` to capture fresh baselines on Linux
#      (macOS-generated snapshots fail CI due to font/antialiasing
#      differences -- documented Playwright pitfall). The workflow runs
#      `playwright test --update-snapshots` and auto-commits the PNGs
#      under `frontend/tests/visual-regression/snapshots/chromium/`.
#   3. Subsequent push/PR runs compare the new screenshots vs the
#      committed baselines; CI fails when maxDiffPixelRatio > 0.015.
#
# phase-75.15 (qa-tests-06): frontend/tests/visual-regression/snapshots/
# chromium/ has ZERO committed PNGs as of 2026-07-24 -- every push/PR run
# would otherwise be guaranteed-red (comparing against nonexistent
# baselines). The "Check baseline presence" step below gates the actual
# comparison run so push/PR triggers stay wired (no re-enable step needed
# once the operator completes the first-run flow above) without ever
# producing a guaranteed-red job in the meantime -- a missing-baseline
# run reports success/skipped (GitHub: "Successful check statuses are
# success, skipped, and neutral" --
# docs.github.com/.../troubleshooting-required-status-checks).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/visual-regression.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/visual-regression.yml"
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate baselines via --update-snapshots"
        required: false
        default: "false"

jobs:
  visual-regression:
    name: Playwright Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check baseline presence
        id: baseline_check
        run: |
          if [ -n "$(find tests/visual-regression/snapshots/chromium -name '*.png' -print -quit 2>/dev/null)" ]; then
            echo "has_baselines=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baselines=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update baselines (workflow_dispatch only)
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: npx playwright test --update-snapshots
        env:
          CI: "true"

      - name: Commit updated baselines (workflow_dispatch only)
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update playwright visual regression baselines [skip ci]"
          file_pattern: "frontend/tests/visual-regression/snapshots/**"

      - name: Run visual regression tests
        if: ${{ github.event.inputs.update_snapshots != 'true' && steps.baseline_check.outputs.has_baselines == 'true' }}
        run: npx playwright test
        env:
          CI: "true"

      - name: Skip (no baselines committed yet)
        if: ${{ github.event.inputs.update_snapshots != 'true' && steps.baseline_check.outputs.has_baselines != 'true' }}
        run: |
          echo "No committed baselines under tests/visual-regression/snapshots/chromium/ -- skipping the comparison run (would be guaranteed-red)."
          echo "Run this workflow via workflow_dispatch with update_snapshots=true to capture the first baseline set (see header)."

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload diff screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-diffs-${{ github.sha }}
          path: frontend/test-results/
          retention-days: 14
