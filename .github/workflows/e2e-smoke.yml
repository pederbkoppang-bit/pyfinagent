name: e2e-smoke

# phase-53.5: credential-free end-to-end smoke (the goal-closing capstone).
# Runs the portable subset that needs NO secrets / NO live BQ / NO LLM:
#   ast syntax -> credential-free pytest -> frontend tsc + build ->
#   run_harness.py --dry-run -> intel_e2e.py --fixtures -> phase6_e2e.py --dry-run.
# Triggers: manual (workflow_dispatch) + nightly (schedule) + every PR to main.
#
# phase-75.15 (qa-tests-01): the advisory soft-launch above is RETIRED. The
# backend pytest lane now selects tests via `-m "not requires_live"`
# (pytest.ini:9, phase-56.2 marker) instead of a hardcoded --ignore list, and
# the job is enforcing (continue-on-error removed) -- a red test now reddens
# this lane and can block a PR. Verified green locally 2026-07-24 at
# CI-equivalent env (PAPER_DATA_INTEGRITY_ENABLED=false
# PAPER_RISK_JUDGE_REJECT_BINDING=false PAPER_SWAP_CHURN_FIX_ENABLED=false --
# these 3 flags default False in code; a fresh CI checkout has no .env and
# so already runs at these defaults) -- see experiment_results_75.15.md for
# the full green tail + the operator-.env-pollution disclosure (these 3
# flags differ locally because the operator's untracked .env has them ON).
# Least-privilege: read-only contents, no secrets, never pull_request_target.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC nightly (off-peak)
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/e2e-smoke.yml'

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: Credential-free end-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      # 1. Syntax: every backend + scripts .py compiles (fast, no imports).
      - name: AST syntax check
        run: python -m compileall -q backend scripts

      # 2. Credential-free backend pytest. Deselect via the `requires_live`
      #    pytest marker (pytest.ini:9, phase-56.2) instead of a hardcoded
      #    --ignore file list -- `-m "not requires_live"` DESELECTS marked
      #    tests (they don't run, so they can't fail the job) while still
      #    collecting every file, catching future live/state-dependent
      #    tests that forget the marker. The 3 flags below default False in
      #    code (backend/config/settings.py) -- a fresh checkout has no
      #    .env so this is already CI's natural state; set explicitly here
      #    so the lane is self-documenting and immune to a future default
      #    flip.
      - name: Backend pytest (credential-free subset)
        env:
          PAPER_DATA_INTEGRITY_ENABLED: "false"
          PAPER_RISK_JUDGE_REJECT_BINDING: "false"
          PAPER_SWAP_CHURN_FIX_ENABLED: "false"
        run: |
          python -m pytest backend/tests/ -q -m "not requires_live"

      # 3. Frontend: install, typecheck, unit tests, production build.
      #    phase-75.15 (qa-tests-10): `npm run test` -> scripts/run-test.mjs
      #    -> `vitest run` (jsdom environment, no server/no :3000 -- 30
      #    files / 201 tests measured 2026-07-24). Placed after tsc so a
      #    typecheck failure still fails fast before the slower test run.
      - name: Frontend tsc + build
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit
          npm run test
          npm run build

      # 4. Harness dry-run (credential-free: lazy BQ client, never queries).
      - name: Harness dry-run
        run: python scripts/harness/run_harness.py --dry-run --cycles 1

      # 5. Intelligence-pipeline e2e on fixtures (no live API/LLM/BQ).
      - name: Intel e2e (fixtures)
        run: python scripts/smoketest/intel_e2e.py --fixtures

      # 6. News/sentiment cron e2e dry-run (StubSource; no live APIs).
      - name: Phase-6 e2e (dry-run)
        run: python scripts/smoketest/phase6_e2e.py --dry-run
