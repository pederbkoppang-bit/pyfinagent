name: e2e-smoke

# phase-53.5: credential-free end-to-end smoke (the goal-closing capstone).
# Runs the portable subset that needs NO secrets / NO live BQ / NO LLM:
#   ast syntax -> credential-free pytest -> frontend tsc + build ->
#   run_harness.py --dry-run -> intel_e2e.py --fixtures -> phase6_e2e.py --dry-run.
# Triggers: manual (workflow_dispatch) + nightly (schedule) + every PR to main.
#
# Soft-launch (continue-on-error: true) -- mirrors env-syntax-lint.yml (phase-40.6):
# the step commands are verified GREEN locally this cycle, but the CI runner lane
# (fresh checkout, no .venv) has not yet had a real run, so it reports without
# blocking merges. Flip continue-on-error -> false once it is green across a few
# real runs (documented follow-up). Least-privilege: read-only contents, no secrets,
# never pull_request_target.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC nightly (off-peak)
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/e2e-smoke.yml'

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: Credential-free end-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # soft-launch; flip to false once green on real runs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      # 1. Syntax: every backend + scripts .py compiles (fast, no imports).
      - name: AST syntax check
        run: python -m compileall -q backend scripts

      # 2. Credential-free backend pytest. Ignore the 6 live/state/always-fail
      #    files (need live BQ / running services / time-sensitive state) so the
      #    subset is deterministic on a runner. Durable fix = a `requires_live`
      #    pytest marker (follow-up).
      - name: Backend pytest (credential-free subset)
        run: |
          python -m pytest backend/tests/ -q \
            --ignore=backend/tests/test_phase_23_2_10_watchdog_no_fire_7d.py \
            --ignore=backend/tests/test_phase_23_2_12_layer1_pipeline_active.py \
            --ignore=backend/tests/test_phase_23_2_14_no_reentrant_locks.py \
            --ignore=backend/tests/test_phase_23_2_16_shortlist_doc_presence.py \
            --ignore=backend/tests/test_agent_map_live_model.py \
            --ignore=backend/tests/test_rainbow_canary.py

      # 3. Frontend: install, typecheck, production build.
      - name: Frontend tsc + build
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit
          npm run build

      # 4. Harness dry-run (credential-free: lazy BQ client, never queries).
      - name: Harness dry-run
        run: python scripts/harness/run_harness.py --dry-run --cycles 1

      # 5. Intelligence-pipeline e2e on fixtures (no live API/LLM/BQ).
      - name: Intel e2e (fixtures)
        run: python scripts/smoketest/intel_e2e.py --fixtures

      # 6. News/sentiment cron e2e dry-run (StubSource; no live APIs).
      - name: Phase-6 e2e (dry-run)
        run: python scripts/smoketest/phase6_e2e.py --dry-run
