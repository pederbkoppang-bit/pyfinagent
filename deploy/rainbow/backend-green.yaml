# phase-12.1 Rainbow deploy -- backend GREEN Deployment.
# Identical to backend-blue.yaml except for the `color: green` label
# (Deployment name, matchLabels, pod template label).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyfinagent-backend-green
  labels:
    app: pyfinagent-backend
    color: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyfinagent-backend
      color: green
  template:
    metadata:
      labels:
        app: pyfinagent-backend
        color: green
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: pyfinagent-backend:v0.1.0
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
