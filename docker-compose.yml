services:
  # Redis for Celery task queue & caching
  redis:
    image: redis:7-alpine
    container_name: pyfinagent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pyfinagent-net

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pyfinagent-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pyfinagent-net

  # Celery worker for background analysis tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pyfinagent-celery
    env_file: ./backend/.env
    command: celery -A backend.tasks.analysis:celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pyfinagent-net

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pyfinagent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pyfinagent-net

networks:
  pyfinagent-net:
    driver: bridge
