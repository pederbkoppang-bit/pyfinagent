services:
  # FastAPI backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pyfinagent-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pyfinagent-net

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pyfinagent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    env_file: ./frontend/.env.local
    volumes:
      - auth-db:/app/prisma
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pyfinagent-net

  # Slack bot (Socket Mode — no ports needed)
  slack-bot:
    build:
      context: .
      dockerfile: backend/slack_bot/Dockerfile
    container_name: pyfinagent-slack-bot
    env_file: ./backend/.env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pyfinagent-net

volumes:
  auth-db:
    driver: local

networks:
  pyfinagent-net:
    driver: bridge
