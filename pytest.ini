; phase-56.2 (55.3 finding map): register the requires_live quarantine marker.
; Tests marked requires_live depend on live BigQuery / live-system state and
; are skipped unless PYFINAGENT_LIVE_TESTS=1 (see each test's reason string
; for the exact dependency). Classification is by ROOT CAUSE -- stale
; assertions and test-pollution failures were FIXED, not quarantined
; (blanket-skipping would hide real regressions).
[pytest]
markers =
    requires_live: test depends on live BigQuery / live-system state; skipped unless PYFINAGENT_LIVE_TESTS=1
